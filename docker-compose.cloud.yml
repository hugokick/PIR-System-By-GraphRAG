name: exhibit-atlas-mvp

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: exhibit-atlas-postgres
    environment:
      POSTGRES_DB: exhibit_atlas
      POSTGRES_USER: exhibit_atlas
      POSTGRES_PASSWORD: exhibit_atlas_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exhibit_atlas -d exhibit_atlas"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: exhibit-atlas-api
    environment:
      DATABASE_URL: postgresql://exhibit_atlas:exhibit_atlas_dev@postgres:5432/exhibit_atlas
    volumes:
      - file_storage:/app/backend/storage
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: deploy/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: "/pir-system"
    container_name: exhibit-atlas-web
    depends_on:
      - backend
    ports:
      - "18080:80"
    restart: unless-stopped

volumes:
  postgres_data:
    name: exhibit_atlas_postgres_data
  file_storage:
    name: exhibit_atlas_file_storage
