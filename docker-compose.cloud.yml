name: exhibit-atlas-mvp

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: exhibit-atlas-postgres
    environment:
      POSTGRES_DB: exhibit_atlas
      POSTGRES_USER: exhibit_atlas
      POSTGRES_PASSWORD: exhibit_atlas_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exhibit_atlas -d exhibit_atlas"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5
    container_name: exhibit-atlas-neo4j
    environment:
      NEO4J_AUTH: neo4j/demo-graph123
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p demo-graph123 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 12
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: exhibit-atlas-api
    environment:
      DATABASE_URL: postgresql://exhibit_atlas:exhibit_atlas_dev@postgres:5432/exhibit_atlas
      NEO4J_DEMO_ENABLED: "true"
      NEO4J_DEMO_AUTO_SEED: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: demo-graph123
    volumes:
      - file_storage:/app/backend/storage
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: deploy/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: "/pir-system"
    container_name: exhibit-atlas-web
    depends_on:
      - backend
    ports:
      - "18080:80"
    restart: unless-stopped

volumes:
  postgres_data:
    name: exhibit_atlas_postgres_data
  file_storage:
    name: exhibit_atlas_file_storage
  neo4j_data:
    name: exhibit_atlas_neo4j_data
